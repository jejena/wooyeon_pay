<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 페이지</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            background-color: #111;
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
        }

        section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            scroll-snap-align: start;
            padding: 20px;
            position: relative; /* 하단 버튼 배치를 위해 추가 */
        }

        h2 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            font-weight: 800;
        }

        .qr-box {
            background: white;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            max-width: 350px;
            width: 90%;
        }

        .qr-box img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 뒤로가기 텍스트 버튼 스타일 */
        .back-link {
            position: absolute;
            bottom: 30px;
            font-size: 12px;
            text-decoration: none;
            opacity: 0.6;
            border-bottom: 1px solid currentColor;
            padding-bottom: 2px;
            cursor: pointer;
        }

        .back-link:hover {
            opacity: 1;
        }

        /* 각 섹션 컬러 구성 */
        #section1 { background-color: #f2f2f2; color: #333; }
        #section2 { background-color: #3182f6; color: white; }
        #section3 { background-color: #fae100; color: #3c1e1e; }
        #section4 { background-color: #03c75a; color: white; }

        @media (max-width: 480px) {
            h2 { font-size: 1.8rem; }
            .qr-box { padding: 15px; }
        }
    </style>
</head>
<body>

    <section id="section1">
        <h6>계좌번호 복사(삼성증권)</h6>
         <h6>-</h6>
        <div class="qr-box">
            <img src="w-pay.png" alt="계좌번호 QR 이미지">
        </div>
        <a href="index.html" class="back-link">뒤로가기</a>
    </section>

    <section id="section2">
        <h2>토스페이</h2>
        <div class="qr-box">
            <img src="toss.jpg" alt="토스페이 QR 이미지">
        </div>
        <a href="index.html" class="back-link">뒤로가기</a>
    </section>

    <section id="section3">
        <h2>카카오페이</h2>
        <div class="qr-box">
            <img src="kakao.png" alt="카카오페이 QR 이미지">
        </div>
        <a href="index.html" class="back-link">뒤로가기</a>
    </section>

    <section id="section4">
        <h2>네이버페이</h2>
        <div class="qr-box">
            <img src="naver.png" alt="네이버페이 QR 이미지">
        </div>
        <a href="index.html" class="back-link">뒤로가기</a>
    </section>

</body>
</html>
